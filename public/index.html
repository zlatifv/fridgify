<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fridgify</title>
<!-- PWA manifest inline -->
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Fridgify&quot;,&quot;short_name&quot;:&quot;Fridgify&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23f1efe8&quot;,&quot;theme_color&quot;:&quot;%231a5cc8&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a5cc8'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E🧊%3C/text%3E%3C/svg%3E&quot;,&quot;sizes&quot;:&quot;any&quot;,&quot;type&quot;:&quot;image/svg+xml&quot;}]}" />
<meta name="theme-color" content="#1a5cc8" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Fridgify" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a5cc8'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E🧊%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --surface-0:#f1efe8;--surface-1:#e8e6e0;--surface-2:#ffffff;
  --border:rgba(0,0,0,0.10);--border-strong:rgba(0,0,0,0.18);
  --text-primary:#1a1a18;--text-secondary:#4a4a45;--text-muted:#888780;
  --bg-accent:#e8f0fb;--text-accent:#1a5cc8;--border-accent:#b3ccf5;
  --fill-accent:#1a5cc8;--on-accent:#ffffff;
  --bg-success:#e8f5e8;--text-success:#1e6b1e;--border-success:#9fd89f;
  --radius:8px;--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
.theme-forest{--surface-0:#1a2e1a;--surface-1:#223322;--surface-2:#2a3d2a;--border:rgba(100,180,100,0.15);--border-strong:rgba(100,180,100,0.3);--text-primary:#e8f5e8;--text-secondary:#9dbf9d;--text-muted:#5a7a5a;--bg-accent:#1e3b1e;--text-accent:#6fcf6f;--border-accent:#3a5c3a;--fill-accent:#4a9e4a;--on-accent:#fff;--bg-success:#1e3b1e;--text-success:#6fcf6f;--border-success:#3a5c3a;--chip-bg:#2a4a2a;--pref-active-bg:#2a4a2a;--pref-active-text:#6fcf6f;--meta-bg:#223322;--meta-text:#9dbf9d}
.theme-sunset{--surface-0:#2d1b0e;--surface-1:#3d2518;--surface-2:#4a2e1e;--border:rgba(180,100,60,0.2);--border-strong:rgba(180,100,60,0.4);--text-primary:#fdebd0;--text-secondary:#c8956a;--text-muted:#8a6045;--bg-accent:#3d2518;--text-accent:#f4a261;--border-accent:#6b3d20;--fill-accent:#e76f51;--on-accent:#fff;--bg-success:#3d2518;--text-success:#f4a261;--border-success:#6b3d20;--chip-bg:#5c3520;--pref-active-bg:#5c3520;--pref-active-text:#f4a261;--meta-bg:#3d2518;--meta-text:#c8956a}
.theme-ocean{--surface-0:#0a1628;--surface-1:#0f2040;--surface-2:#142a50;--border:rgba(79,195,247,0.15);--border-strong:rgba(79,195,247,0.3);--text-primary:#e1f5fe;--text-secondary:#7fb3d3;--text-muted:#3a6a8a;--bg-accent:#0f2040;--text-accent:#4fc3f7;--border-accent:#1a3a6a;--fill-accent:#0288d1;--on-accent:#fff;--bg-success:#0f2040;--text-success:#4fc3f7;--border-success:#1a3a6a;--chip-bg:#0a2a4a;--pref-active-bg:#0a2a4a;--pref-active-text:#4fc3f7;--meta-bg:#0f2040;--meta-text:#7fb3d3}
.theme-lavender{--surface-0:#1a1528;--surface-1:#221e38;--surface-2:#2a2545;--border:rgba(179,157,219,0.15);--border-strong:rgba(179,157,219,0.3);--text-primary:#ede7f6;--text-secondary:#9575cd;--text-muted:#5a4e80;--bg-accent:#221e38;--text-accent:#b39ddb;--border-accent:#3d3560;--fill-accent:#7e57c2;--on-accent:#fff;--bg-success:#221e38;--text-success:#b39ddb;--border-success:#3d3560;--chip-bg:#312a50;--pref-active-bg:#312a50;--pref-active-text:#b39ddb;--meta-bg:#221e38;--meta-text:#9575cd}
.theme-paper{--surface-0:#faf6f0;--surface-1:#f2ece2;--surface-2:#fff;--border:rgba(100,70,40,0.12);--border-strong:rgba(100,70,40,0.25);--text-primary:#2c1810;--text-secondary:#6b4c35;--text-muted:#a08060;--bg-accent:#f0e4d0;--text-accent:#8b5e3c;--border-accent:#c9a07a;--fill-accent:#8b5e3c;--on-accent:#fff;--bg-success:#f0e4d0;--text-success:#8b5e3c;--border-success:#c9a07a;--chip-bg:#f0e4d0;--pref-active-bg:#f0e4d0;--pref-active-text:#8b5e3c;--meta-bg:#f0e4d0;--meta-text:#6b4c35}
body{font-family:var(--font-sans);background:var(--surface-0);color:var(--text-primary);min-height:100vh;transition:background 0.25s,color 0.25s}
.shell{max-width:720px;margin:0 auto;padding:0 1rem 4rem}
nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 0;margin-bottom:0.5rem;gap:12px;flex-wrap:wrap}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:7px 16px;border-radius:20px;font-size:14px;border:0.5px solid transparent;cursor:pointer;background:none;color:var(--text-muted);font-family:var(--font-sans);transition:all 0.15s}
.nav-tab.active{background:var(--surface-2);border-color:var(--border-strong);color:var(--text-primary)}
.nav-tab:not(.active):hover{color:var(--text-secondary)}
.nav-right{display:flex;align-items:center;gap:10px}
select{height:32px;padding:0 10px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-2);color:var(--text-primary);font-size:13px;font-family:var(--font-sans);cursor:pointer}
.theme-dots{display:flex;gap:6px;align-items:center}
.theme-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:border-color 0.15s;flex-shrink:0}
.theme-dot.active{border-color:var(--text-primary)}
.dot-default{background:conic-gradient(#e8e6e1 0deg 90deg,#3d3d3a 90deg 180deg,#e8e6e1 180deg 270deg,#3d3d3a 270deg)}.dot-forest{background:#4a9e4a}.dot-sunset{background:#e76f51}.dot-ocean{background:#0288d1}.dot-lavender{background:#7e57c2}.dot-paper{background:#8b5e3c}
.page{display:none}.page.active{display:block}
.page-header{margin-bottom:1.75rem}
.page-header h1{font-size:22px;font-weight:500;color:var(--text-primary)}
.page-header p{font-size:14px;color:var(--text-muted);margin-top:4px}
.input-row{display:flex;gap:8px;margin-bottom:10px}
.input-row input{flex:1;height:36px;padding:0 12px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-2);color:var(--text-primary);font-size:14px;font-family:var(--font-sans)}
.input-row input::placeholder{color:var(--text-muted)}
.input-row input:focus{outline:none;box-shadow:0 0 0 2px var(--bg-accent);border-color:var(--border-accent)}
.add-btn{height:36px;padding:0 16px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-2);color:var(--text-primary);font-size:14px;cursor:pointer;font-family:var(--font-sans);white-space:nowrap;display:flex;align-items:center;gap:6px}
.add-btn:hover{background:var(--surface-1)}
.chips{display:flex;flex-wrap:wrap;gap:8px;min-height:32px;margin-bottom:1.25rem}
.chip{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 12px;border-radius:20px;background:var(--chip-bg,var(--bg-accent));color:var(--text-accent);font-size:13px;font-weight:500}
.chip button{background:none;border:none;cursor:pointer;color:var(--text-accent);padding:0;line-height:1;font-size:16px;opacity:0.7}
.chip button:hover{opacity:1}
.chip-empty{font-size:13px;color:var(--text-muted);padding:6px 0}
.section-label{font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.prefs-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.pref-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-secondary);cursor:pointer;font-family:var(--font-sans)}
.pref-btn.active{background:var(--pref-active-bg,var(--bg-success));color:var(--pref-active-text,var(--text-success));border-color:var(--border-success)}
.generate-btn{width:100%;height:42px;border-radius:var(--radius);border:none;background:var(--fill-accent);color:var(--on-accent);font-size:15px;font-weight:500;cursor:pointer;font-family:var(--font-sans);transition:opacity 0.15s}
.generate-btn:hover{opacity:0.88}
.generate-btn:disabled{opacity:0.4;cursor:not-allowed}
/* Collab banner */
.collab-banner{background:var(--bg-accent);border:0.5px solid var(--border-accent);border-radius:12px;padding:12px 16px;margin-top:1rem;font-size:13px;color:var(--text-accent)}
.collab-banner strong{display:block;margin-bottom:4px;font-size:14px}
.collab-link{word-break:break-all;font-size:12px;opacity:0.8;font-family:monospace;margin:6px 0;display:block}
.collab-info{font-size:12px;color:var(--text-muted);margin-top:4px}
.collab-btn-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.collab-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border-accent);background:var(--fill-accent);color:var(--on-accent);cursor:pointer;font-family:var(--font-sans)}
.collab-btn.secondary{background:none;color:var(--text-accent)}
.collab-merged{background:var(--bg-success);border-color:var(--border-success);color:var(--text-success)}
.results{margin-top:1.75rem}
.results-header{font-size:13px;color:var(--text-muted);margin-bottom:1rem}
.recipe-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:12px}
.recipe-name{font-size:16px;font-weight:500;color:var(--text-primary);margin-bottom:6px}
.recipe-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.meta-pill{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--meta-bg,var(--surface-1));color:var(--meta-text,var(--text-secondary));display:flex;align-items:center;gap:4px}
.recipe-desc{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:8px}
.card-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.expand-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text-accent);padding:0;font-family:var(--font-sans)}
.expand-btn:hover{text-decoration:underline}
.save-btn{background:none;border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--text-muted);padding:4px 10px;font-family:var(--font-sans);display:flex;align-items:center;gap:5px;transition:all 0.15s}
.save-btn:hover{border-color:var(--border-strong);color:var(--text-secondary)}
.save-btn.saved{background:var(--bg-accent);color:var(--text-accent);border-color:var(--border-accent)}
.cook-btn{background:var(--fill-accent);border:none;border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--on-accent);padding:4px 12px;font-family:var(--font-sans);display:flex;align-items:center;gap:5px}
.recipe-detail{margin-top:12px;border-top:0.5px solid var(--border);padding-top:12px;display:none}
.recipe-detail.open{display:block}
.detail-section{margin-bottom:12px}
.detail-title{font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.detail-list{list-style:none;padding:0}
.detail-list li{font-size:13px;color:var(--text-secondary);line-height:1.7;padding-left:14px;position:relative}
.detail-list li::before{content:"·";position:absolute;left:0;color:var(--text-muted)}
.chef-tip{font-size:13px;color:var(--text-secondary);line-height:1.6;padding-left:14px}
/* Cook mode overlay */
.cook-overlay{display:none;position:fixed;inset:0;background:var(--surface-0);z-index:1000;flex-direction:column}
.cook-overlay.open{display:flex}
.cook-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:0.5px solid var(--border);flex-shrink:0}
.cook-title-text{font-size:16px;font-weight:500;color:var(--text-primary)}
.cook-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-muted);font-family:var(--font-sans);padding:0}
.cook-body{flex:1;overflow-y:auto;padding:2rem 1.5rem;max-width:680px;margin:0 auto;width:100%}
.cook-progress{display:flex;gap:4px;margin-bottom:2rem;flex-wrap:wrap}
.cook-pip{width:24px;height:4px;border-radius:2px;background:var(--border-strong);transition:background 0.2s}
.cook-pip.done{background:var(--fill-accent)}
.cook-pip.current{background:var(--fill-accent);opacity:0.5}
.cook-step-num{font-size:12px;font-weight:600;color:var(--text-accent);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.cook-step-text{font-size:18px;line-height:1.7;color:var(--text-primary);margin-bottom:2rem}
.cook-timer-row{display:flex;align-items:center;gap:12px;margin-bottom:2rem}
.cook-timer{font-size:32px;font-weight:300;color:var(--text-primary);font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
.cook-timer-btn{height:36px;padding:0 16px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-2);color:var(--text-primary);font-size:13px;cursor:pointer;font-family:var(--font-sans)}
.cook-footer{padding:1rem 1.5rem;border-top:0.5px solid var(--border);display:flex;gap:10px;flex-shrink:0;max-width:680px;margin:0 auto;width:100%}
.cook-nav-btn{flex:1;height:44px;border-radius:var(--radius);font-size:15px;font-weight:500;cursor:pointer;font-family:var(--font-sans);border:0.5px solid var(--border-strong);background:var(--surface-2);color:var(--text-primary)}
.cook-nav-btn.primary{background:var(--fill-accent);color:var(--on-accent);border-color:transparent}
.cook-nav-btn:disabled{opacity:0.3;cursor:not-allowed}
.cook-done-screen{text-align:center;padding:3rem 0}
.cook-done-screen .cook-done-icon{font-size:48px;margin-bottom:1rem}
.cook-done-screen h2{font-size:20px;font-weight:500;color:var(--text-primary);margin-bottom:8px}
.cook-done-screen p{font-size:14px;color:var(--text-muted)}
/* Loading */
.loading-state{text-align:center;padding:2.5rem 0}
.loading-state p{font-size:14px;color:var(--text-muted);margin-top:8px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--fill-accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{font-size:13px;color:#c0392b;background:#fdecea;border-radius:var(--radius);padding:10px 14px;margin-top:1rem}
/* Recent */
.recent-empty{text-align:center;padding:4rem 1rem;color:var(--text-muted);font-size:14px;line-height:1.8}
.recent-empty i{font-size:36px;display:block;margin-bottom:12px;opacity:0.4}
.recent-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.clear-btn{font-size:12px;color:var(--text-muted);background:none;border:none;cursor:pointer;font-family:var(--font-sans);padding:0}
.clear-btn:hover{color:var(--text-secondary)}
.recent-date{font-size:11px;color:var(--text-muted);margin-bottom:6px;margin-top:1.25rem;text-transform:uppercase;letter-spacing:0.05em;font-weight:500}
.recent-date:first-child{margin-top:0}
/* Install PWA button */
#install-btn{display:none;font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border-strong);background:var(--surface-2);color:var(--text-secondary);cursor:pointer;font-family:var(--font-sans);align-items:center;gap:5px}
#install-btn.visible{display:flex}
</style>
</head>
<body class="theme-default">

<!-- Cook mode overlay -->
<div class="cook-overlay" id="cook-overlay" role="dialog" aria-modal="true">
  <div class="cook-header">
    <div>
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:2px" id="cook-recipe-name"></div>
      <div class="cook-title-text" id="cook-header-label">Cook mode</div>
    </div>
    <button class="cook-close" onclick="closeCookMode()" aria-label="Close">✕</button>
  </div>
  <div class="cook-body">
    <div class="cook-progress" id="cook-progress"></div>
    <div id="cook-step-content"></div>
  </div>
  <div class="cook-footer">
    <button class="cook-nav-btn" id="cook-prev-btn" onclick="cookNav(-1)" disabled>← Prev</button>
    <button class="cook-nav-btn primary" id="cook-next-btn" onclick="cookNav(1)">Next →</button>
  </div>
</div>

<div class="shell">
  <nav>
    <div style="display:flex;align-items:center;gap:16px">
      <div style="font-size:18px;font-weight:600;color:var(--text-primary);letter-spacing:-0.02em">
        <span style="color:var(--fill-accent)">F</span>ridgify
      </div>
      <div class="nav-tabs">
        <button class="nav-tab active" onclick="showPage('generator')" id="tab-generator">Generator</button>
        <button class="nav-tab" onclick="showPage('recent')" id="tab-recent">Recent</button>
      </div>
    </div>
    <div class="nav-right">
      <button id="install-btn" onclick="installPWA()"><i class="ti ti-download" aria-hidden="true"></i> Install</button>
      <select id="lang-select" onchange="setLang(this.value)">
        <option value="en">🇬🇧 English</option>
        <option value="bg">🇧🇬 Български</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="it">🇮🇹 Italiano</option>
        <option value="zh">🇨🇳 中文</option>
        <option value="ja">🇯🇵 日本語</option>
      </select>
      <div class="theme-dots">
        <div class="theme-dot dot-default active" onclick="setTheme('default')" title="Default"></div>
        <div class="theme-dot dot-forest"  onclick="setTheme('forest')"  title="Forest"></div>
        <div class="theme-dot dot-sunset"  onclick="setTheme('sunset')"  title="Sunset"></div>
        <div class="theme-dot dot-ocean"   onclick="setTheme('ocean')"   title="Ocean"></div>
        <div class="theme-dot dot-lavender" onclick="setTheme('lavender')" title="Lavender"></div>
        <div class="theme-dot dot-paper"   onclick="setTheme('paper')"   title="Paper"></div>
      </div>
    </div>
  </nav>

  <!-- Generator page -->
  <div class="page active" id="page-generator">
    <div class="page-header">
      <h1 id="ui-title">What's in your fridge?</h1>
      <p id="ui-subtitle">Add your ingredients and Fridgify will find what you can make.</p>
    </div>
    <div class="input-row">
      <input id="ing-input" type="text" maxlength="60" />
      <button class="add-btn" onclick="addIngredient()">
        <i class="ti ti-plus" aria-hidden="true"></i>
        <span id="ui-add">Add</span>
      </button>
    </div>
    <div class="chips" id="chips"></div>
    <div class="section-label" id="ui-diet-label">Diet</div>
    <div class="prefs-row" id="prefs-row"></div>
    <button class="generate-btn" id="gen-btn" onclick="generate()" disabled></button>
    <!-- Collab section -->
    <div id="collab-section" style="margin-top:1.25rem"></div>
    <div id="results"></div>
  </div>

  <!-- Recent page -->
  <div class="page" id="page-recent">
    <div class="page-header">
      <h1 id="ui-recent-title">Saved recipes</h1>
      <p id="ui-recent-subtitle">Recipes you've bookmarked for later.</p>
    </div>
    <div id="recent-content"></div>
  </div>
</div>

<script>

/* ─── State ──────────────────────────────────────────────────────────── */
let lang='en', ingredients=[], prefs=[], currentRecipes=[];
let savedRecipes=JSON.parse(localStorage.getItem('fridgify-saved')||'[]');
let currentPage='generator';
// Collab state
let collabSessionId=null, collabRole=null, collabFriendIngredients=[], collabPollTimer=null;
// Cook mode state
let cookRecipe=null, cookStep=0, cookTimerInterval=null, cookTimerSeconds=0, cookTimerRunning=false;
// PWA
let deferredInstallPrompt=null;

/* ─── Helpers ───────────────────────────────────────────────────────── */
function t(k,...a){const l=LANGS[lang]||LANGS.en,v=l[k]!==undefined?l[k]:LANGS.en[k];return typeof v==='function'?v(...a):(v||'')}
function persist(){localStorage.setItem('fridgify-saved',JSON.stringify(savedRecipes))}
function formatDate(iso){return new Date(iso).toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'})}

/* ─── PWA ────────────────────────────────────────────────────────────── */
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstallPrompt=e;document.getElementById('install-btn').classList.add('visible')});
async function installPWA(){if(!deferredInstallPrompt)return;deferredInstallPrompt.prompt();const r=await deferredInstallPrompt.userChoice;if(r.outcome==='accepted'){document.getElementById('install-btn').classList.remove('visible')}deferredInstallPrompt=null}
// Service worker for offline support
if('serviceWorker' in navigator){window.addEventListener('load',()=>{const sw=`
self.addEventListener('install',e=>e.waitUntil(caches.open('fridgify-v1').then(c=>c.addAll([location.pathname]))));
self.addEventListener('fetch',e=>{if(e.request.mode==='navigate'){e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))}});
`;const blob=new Blob([sw],{type:'application/javascript'});const url=URL.createObjectURL(blob);navigator.serviceWorker.register(url).catch(()=>{})})}

/* ─── Navigation ─────────────────────────────────────────────────────── */
function showPage(name){currentPage=name;document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));document.getElementById('page-'+name).classList.add('active');document.getElementById('tab-'+name).classList.add('active');if(name==='recent')renderRecent()}

/* ─── Theme ──────────────────────────────────────────────────────────── */
function setTheme(theme){document.body.className='theme-'+theme;document.querySelectorAll('.theme-dot').forEach(d=>d.classList.remove('active'));document.querySelector('.dot-'+theme).classList.add('active')}

/* ─── Language ───────────────────────────────────────────────────────── */
function setLang(l){lang=l;renderUI();if(currentPage==='recent')renderRecent()}
function renderUI(){document.getElementById('ui-title').textContent=t('title');document.getElementById('ui-subtitle').textContent=t('subtitle');document.getElementById('ui-add').textContent=t('add');document.getElementById('ing-input').placeholder=t('placeholder');document.getElementById('ui-diet-label').textContent=t('diet');document.getElementById('ui-recent-title').textContent=t('recentTitle');document.getElementById('ui-recent-subtitle').textContent=t('recentSubtitle');renderChips();renderPrefs();updateBtn();renderCollab()}
function renderPrefs(){const labels=t('prefs'),keys=t('prefKeys');document.getElementById('prefs-row').innerHTML=labels.map((label,i)=>`<button class="pref-btn${prefs.includes(keys[i])?' active':''}" onclick="togglePref(this,'${keys[i]}')">${label}</button>`).join('')}

/* ─── Ingredients ────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('ing-input').addEventListener('keydown',e=>{if(e.key==='Enter')addIngredient()});checkCollabFromURL();renderUI()});
function addIngredient(){const input=document.getElementById('ing-input'),val=input.value.trim().toLowerCase();if(!val||ingredients.includes(val)){input.value='';return}ingredients.push(val);input.value='';renderChips();updateBtn();if(collabRole==='host')saveHostIngredients()}
function removeIngredient(i){ingredients.splice(i,1);renderChips();updateBtn();if(collabRole==='host')saveHostIngredients()}
function renderChips(){const el=document.getElementById('chips');if(!ingredients.length){el.innerHTML=`<span class="chip-empty">${t('empty')}</span>`;return}let html=ingredients.map((ing,i)=>`<span class="chip">${ing}<button onclick="removeIngredient(${i})" aria-label="Remove ${ing}">×</button></span>`).join('');if(collabFriendIngredients.length){html+=`<span class="chip" style="opacity:0.6;font-style:italic">${t('collabFriendCount',collabFriendIngredients.length)}</span>`}el.innerHTML=html}
function togglePref(btn,pref){if(prefs.includes(pref)){prefs=prefs.filter(p=>p!==pref);btn.classList.remove('active')}else{prefs.push(pref);btn.classList.add('active')}}
function updateBtn(){const btn=document.getElementById('gen-btn');if(ingredients.length){btn.disabled=false;btn.textContent=t('btnReady',ingredients.length+(collabFriendIngredients.length||0))}else{btn.disabled=true;btn.textContent=t('btnEmpty')}}

/* ─── Collab ─────────────────────────────────────────────────────────── */
// We use localStorage as a simple "shared" store keyed by session ID
// (Works across tabs on same device. For real multi-device you'd need a backend.)
function generateSessionId(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36)}
function collabKey(id){return'fridgify-collab-'+id}
function saveHostIngredients(){if(!collabSessionId)return;const data=JSON.parse(localStorage.getItem(collabKey(collabSessionId))||'{}');data.host=ingredients;data.ts=Date.now();localStorage.setItem(collabKey(collabSessionId),JSON.stringify(data))}
function saveGuestIngredients(){if(!collabSessionId)return;const data=JSON.parse(localStorage.getItem(collabKey(collabSessionId))||'{}');data.guest=ingredients;data.ts=Date.now();localStorage.setItem(collabKey(collabSessionId),JSON.stringify(data))}
function startCollabHost(){collabSessionId=generateSessionId();collabRole='host';saveHostIngredients();renderCollab();startHostPolling()}
function startHostPolling(){collabPollTimer=setInterval(()=>{const data=JSON.parse(localStorage.getItem(collabKey(collabSessionId))||'{}');if(data.guest&&data.guest.length>0&&JSON.stringify(data.guest)!==JSON.stringify(collabFriendIngredients)){collabFriendIngredients=data.guest;renderCollab();renderChips();updateBtn()}},1500)}
function checkCollabFromURL(){const params=new URLSearchParams(location.search);const sid=params.get('collab');if(sid){collabSessionId=sid;collabRole='guest';// Load host's existing ingredients as reference
const data=JSON.parse(localStorage.getItem(collabKey(sid))||'{}');collabFriendIngredients=data.host||[];renderCollab();renderChips();updateBtn()}}
function renderCollab(){const el=document.getElementById('collab-section');if(!collabSessionId&&!collabRole){el.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><button class="pref-btn" onclick="startCollabHost()" style="display:flex;align-items:center;gap:6px"><i class="ti ti-users" style="font-size:14px" aria-hidden="true"></i>${t('collabShare')}</button><span style="font-size:12px;color:var(--text-muted)">${t('collabDesc')}</span></div>`;return}
if(collabRole==='host'){const url=`${location.origin}${location.pathname}?collab=${collabSessionId}`;const hasFriend=collabFriendIngredients.length>0;el.innerHTML=`<div class="collab-banner${hasFriend?' collab-merged':''}"><strong>${t('collabTitle')}</strong><span class="collab-link">${url}</span><div class="collab-btn-row"><button class="collab-btn" onclick="copyCollabLink('${url}')" id="collab-copy-btn">${t('collabCopy')}</button><button class="collab-btn secondary" onclick="endCollab()">&times; End</button></div><div class="collab-info">${hasFriend?t('collabFriendAdded'):t('collabWaiting')}</div></div>`;return}
if(collabRole==='guest'){el.innerHTML=`<div class="collab-banner collab-merged"><strong>${t('collabTitle')}</strong><div class="collab-info">${t('collabFriendAdded')}</div><div class="collab-btn-row"><button class="collab-btn" onclick="submitGuestIngredients()">${t('collabGenerate')}</button></div></div>`;return}}
function copyCollabLink(url){navigator.clipboard.writeText(url).then(()=>{const btn=document.getElementById('collab-copy-btn');if(btn){btn.textContent=t('collabCopied');setTimeout(()=>{if(btn)btn.textContent=t('collabCopy')},2000)}}).catch(()=>{})}
function submitGuestIngredients(){saveGuestIngredients();generate()}
function endCollab(){clearInterval(collabPollTimer);collabSessionId=null;collabRole=null;collabFriendIngredients=[];history.replaceState({},'',location.pathname);renderCollab();renderChips();updateBtn()}

/* ─── Generate ───────────────────────────────────────────────────────── */
async function generate(){const btn=document.getElementById('gen-btn'),results=document.getElementById('results');btn.disabled=true;btn.textContent=t('btnLoading');currentRecipes=[];results.innerHTML=`<div class="loading-state"><div class="spinner"></div><p>${t('loading')}</p></div>`;
const allIngredients=[...new Set([...ingredients,...collabFriendIngredients])];
const prefStr=prefs.length?`Dietary preferences: ${prefs.join(', ')}.`:'';
const langNames={en:'English',bg:'Bulgarian',es:'Spanish',fr:'French',de:'German',it:'Italian',zh:'Chinese (Simplified)',ja:'Japanese'};
const prompt=`You are a creative chef assistant. Suggest 4 recipes. Respond entirely in ${langNames[lang]||'English'}.
Ingredients: ${allIngredients.join(', ')}.
${prefStr}
Respond ONLY with a JSON array (no markdown, no extra text):
[{"name":"...","time":"...","difficulty":"...","servings":"...","description":"...","ingredients":["..."],"steps":["..."],"tip":"..."}]
Vary cuisines. Note missing key ingredients as "also need: X" in the list.`;
try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})});const data=await res.json();const text=data.content.map(b=>b.text||'').join('');const clean=text.replace(/```json|```/g,'').trim();const recipes=JSON.parse(clean);currentRecipes=recipes;renderRecipes(recipes)}catch(e){results.innerHTML=`<div class="error-msg">${t('error')}</div>`}
btn.disabled=false;btn.textContent=t('btnReady',allIngredients.length)}

/* ─── Recipe cards ───────────────────────────────────────────────────── */
function isSaved(name){return savedRecipes.some(r=>r.name===name)}
function toggleSave(name,idx,fromRecent){if(isSaved(name)){savedRecipes=savedRecipes.filter(r=>r.name!==name)}else{const recipe=fromRecent?savedRecipes[idx]:currentRecipes[idx];if(recipe)savedRecipes.unshift({...recipe,savedAt:new Date().toISOString()})}persist();const saveId=(fromRecent?'rsave-':'gsave-')+idx;const btn=document.getElementById(saveId);if(btn){const sv=isSaved(name);btn.className='save-btn'+(sv?' saved':'');btn.innerHTML=`<i class="ti ${sv?'ti-bookmark-filled':'ti-bookmark'}" aria-hidden="true"></i> ${sv?t('saved'):t('save')}`}if(fromRecent)renderRecent()}
function toggleDetail(pfx,id){const el=document.getElementById(pfx+'detail-'+id),btn=document.getElementById(pfx+'expand-'+id);if(el.classList.contains('open')){el.classList.remove('open');btn.textContent=t('expand')}else{el.classList.add('open');btn.textContent=t('collapse')}}
function recipeCardHTML(r,idx,pfx,fromRecent){const sv=isSaved(r.name);const sid=(fromRecent?'rsave-':'gsave-')+idx;const nameEsc=r.name.replace(/'/g,"\\'");return`<div class="recipe-card"><div class="recipe-name">${r.name}</div><div class="recipe-meta"><span class="meta-pill"><i class="ti ti-clock" style="font-size:12px" aria-hidden="true"></i> ${r.time}</span><span class="meta-pill">${r.difficulty}</span><span class="meta-pill"><i class="ti ti-users" style="font-size:12px" aria-hidden="true"></i> ${r.servings}</span></div><p class="recipe-desc">${r.description}</p><div class="card-actions"><button class="expand-btn" id="${pfx}expand-${idx}" onclick="toggleDetail('${pfx}',${idx})">${t('expand')}</button><button class="save-btn${sv?' saved':''}" id="${sid}" onclick="toggleSave('${nameEsc}',${idx},${fromRecent})"><i class="ti ${sv?'ti-bookmark-filled':'ti-bookmark'}" aria-hidden="true"></i> ${sv?t('saved'):t('save')}</button><button class="cook-btn" onclick="openCookMode(${fromRecent?idx:(currentRecipes.indexOf(r))},${fromRecent})"><i class="ti ti-chef-hat" style="font-size:12px" aria-hidden="true"></i> ${t('cook')}</button></div><div class="recipe-detail" id="${pfx}detail-${idx}"><div class="detail-section"><div class="detail-title">${t('ingredients')}</div><ul class="detail-list">${r.ingredients.map(ing=>`<li>${ing}</li>`).join('')}</ul></div><div class="detail-section"><div class="detail-title">${t('steps')}</div><ul class="detail-list">${r.steps.map(s=>`<li>${s}</li>`).join('')}</ul></div>${r.tip?`<div class="detail-section"><div class="detail-title">${t('tip')}</div><p class="chef-tip">${r.tip}</p></div>`:''}</div></div>`}
function renderRecipes(recipes){const results=document.getElementById('results');results.innerHTML=`<p class="results-header">${t('results',recipes.length)}</p>`+recipes.map((r,i)=>recipeCardHTML(r,i,'g',false)).join('')}

/* ─── Cook mode ──────────────────────────────────────────────────────── */
function openCookMode(idx,fromRecent){const recipe=fromRecent?savedRecipes[idx]:currentRecipes[idx];if(!recipe||!recipe.steps||!recipe.steps.length)return;cookRecipe=recipe;cookStep=0;stopCookTimer();document.getElementById('cook-recipe-name').textContent=recipe.name;document.getElementById('cook-overlay').classList.add('open');document.body.style.overflow='hidden';renderCookStep()}
function closeCookMode(){document.getElementById('cook-overlay').classList.remove('open');document.body.style.overflow='';stopCookTimer();cookRecipe=null}
function renderCookStep(){if(!cookRecipe)return;const steps=cookRecipe.steps,n=steps.length,isDone=cookStep>=n;
// Progress pips
const pips=document.getElementById('cook-progress');pips.innerHTML=Array.from({length:n},(_,i)=>`<div class="cook-pip${i<cookStep?' done':i===cookStep?' current':''}"></div>`).join('');
// Navigation
const prevBtn=document.getElementById('cook-prev-btn'),nextBtn=document.getElementById('cook-next-btn');prevBtn.textContent=t('prevStep');prevBtn.disabled=cookStep===0;if(isDone){nextBtn.textContent=t('finishCook')}else{nextBtn.textContent=cookStep===n-1?t('finishCook'):t('nextStep')}
// Content
const content=document.getElementById('cook-step-content');document.getElementById('cook-header-label').textContent=isDone?t('cookDone'):t('cookStep',cookStep+1,n);
if(isDone){content.innerHTML=`<div class="cook-done-screen"><div class="cook-done-icon">🍽️</div><h2>${t('cookDone')}</h2><p>${t('cookDoneMsg')}</p></div>`;stopCookTimer();return}
// Detect if step has a time hint (e.g. "5 minutes", "10 min")
const step=steps[cookStep];const timeMatch=step.match(/(\d+)\s*(?:minutes?|mins?|стъпки|минут)/i);const seconds=timeMatch?parseInt(timeMatch[1])*60:0;
content.innerHTML=`<div class="cook-step-num">${t('cookStep',cookStep+1,n)}</div><div class="cook-step-text">${step}</div>${seconds?renderTimerHTML(seconds):''}`;
if(seconds&&cookTimerSeconds===0){cookTimerSeconds=seconds}}
function renderTimerHTML(defaultSec){const m=Math.floor(cookTimerSeconds/60),s=cookTimerSeconds%60;const display=cookTimerSeconds>0?`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${String(Math.floor(defaultSec/60)).padStart(2,'0')}:${String(defaultSec%60).padStart(2,'0')}`;return`<div class="cook-timer-row"><span class="cook-timer" id="cook-timer-display">${display}</span><button class="cook-timer-btn" id="cook-timer-btn" onclick="toggleCookTimer(${defaultSec})">${cookTimerRunning?'⏸ Pause':'▶ Start'}</button><button class="cook-timer-btn" onclick="resetCookTimer(${defaultSec})">↺ Reset</button></div>`}
function cookNav(dir){if(!cookRecipe)return;const n=cookRecipe.steps.length;if(dir>0&&cookStep>=n){closeCookMode();return}cookStep=Math.max(0,Math.min(cookStep+dir,n));stopCookTimer();cookTimerSeconds=0;renderCookStep()}
function toggleCookTimer(defaultSec){if(cookTimerRunning){stopCookTimer()}else{if(cookTimerSeconds<=0)cookTimerSeconds=defaultSec;cookTimerRunning=true;document.getElementById('cook-timer-btn').textContent='⏸ Pause';cookTimerInterval=setInterval(()=>{cookTimerSeconds--;updateTimerDisplay();if(cookTimerSeconds<=0){stopCookTimer();document.getElementById('cook-timer-display').textContent='00:00';document.getElementById('cook-timer-display').style.color='var(--text-accent)'}},1000)}}
function stopCookTimer(){clearInterval(cookTimerInterval);cookTimerInterval=null;cookTimerRunning=false;const btn=document.getElementById('cook-timer-btn');if(btn)btn.textContent='▶ Start'}
function resetCookTimer(defaultSec){stopCookTimer();cookTimerSeconds=defaultSec;updateTimerDisplay()}
function updateTimerDisplay(){const el=document.getElementById('cook-timer-display');if(el){const m=Math.floor(cookTimerSeconds/60),s=cookTimerSeconds%60;el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}}

/* ─── Recent page ────────────────────────────────────────────────────── */
function clearAll(){if(!confirm('Clear all saved recipes?'))return;savedRecipes=[];persist();renderRecent()}
function renderRecent(){const el=document.getElementById('recent-content');if(!savedRecipes.length){el.innerHTML=`<div class="recent-empty"><i class="ti ti-bookmark" aria-hidden="true"></i>${t('recentEmpty').replace('\n','<br>')}<br><br><button class="pref-btn" style="margin-top:4px" onclick="showPage('generator')">${t('goGen')}</button></div>`;return}
const groups={};savedRecipes.forEach(r=>{const d=formatDate(r.savedAt||new Date().toISOString());if(!groups[d])groups[d]=[];groups[d].push(r)});
let html=`<div class="recent-header-row"><span class="results-header">${savedRecipes.length} saved</span><button class="clear-btn" onclick="clearAll()">${t('clearAll')}</button></div>`;
Object.entries(groups).forEach(([date,recipes])=>{html+=`<div class="recent-date">${date}</div>`;html+=recipes.map(r=>{const gi=savedRecipes.indexOf(r);return recipeCardHTML(r,gi,'r',true)}).join('')});
el.innerHTML=html}
</script>
</body>
