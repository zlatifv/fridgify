<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fridgify</title>
<meta name="description" content="Turn what's in your fridge into recipe ideas." />
<meta name="theme-color" content="#1a5cc8" />
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="/icons/icon-192.png" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Fridgify" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --surface-0: #f1efe8;
    --surface-1: #e8e6e0;
    --surface-2: #ffffff;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --text-primary: #1a1a18;
    --text-secondary: #4a4a45;
    --text-muted: #888780;
    --bg-accent: #e8f0fb;
    --text-accent: #1a5cc8;
    --border-accent: #b3ccf5;
    --fill-accent: #1a5cc8;
    --on-accent: #ffffff;
    --bg-success: #e8f5e8;
    --text-success: #1e6b1e;
    --border-success: #9fd89f;
    --radius: 8px;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* Themes */
  .theme-forest {
    --surface-0: #1a2e1a; --surface-1: #223322; --surface-2: #2a3d2a;
    --border: rgba(100,180,100,0.15); --border-strong: rgba(100,180,100,0.3);
    --text-primary: #e8f5e8; --text-secondary: #9dbf9d; --text-muted: #5a7a5a;
    --bg-accent: #1e3b1e; --text-accent: #6fcf6f; --border-accent: #3a5c3a;
    --fill-accent: #4a9e4a; --on-accent: #fff;
    --bg-success: #1e3b1e; --text-success: #6fcf6f; --border-success: #3a5c3a;
    --chip-bg: #2a4a2a; --pref-active-bg: #2a4a2a; --pref-active-text: #6fcf6f;
    --meta-bg: #223322; --meta-text: #9dbf9d;
  }
  .theme-sunset {
    --surface-0: #2d1b0e; --surface-1: #3d2518; --surface-2: #4a2e1e;
    --border: rgba(180,100,60,0.2); --border-strong: rgba(180,100,60,0.4);
    --text-primary: #fdebd0; --text-secondary: #c8956a; --text-muted: #8a6045;
    --bg-accent: #3d2518; --text-accent: #f4a261; --border-accent: #6b3d20;
    --fill-accent: #e76f51; --on-accent: #fff;
    --bg-success: #3d2518; --text-success: #f4a261; --border-success: #6b3d20;
    --chip-bg: #5c3520; --pref-active-bg: #5c3520; --pref-active-text: #f4a261;
    --meta-bg: #3d2518; --meta-text: #c8956a;
  }
  .theme-ocean {
    --surface-0: #0a1628; --surface-1: #0f2040; --surface-2: #142a50;
    --border: rgba(79,195,247,0.15); --border-strong: rgba(79,195,247,0.3);
    --text-primary: #e1f5fe; --text-secondary: #7fb3d3; --text-muted: #3a6a8a;
    --bg-accent: #0f2040; --text-accent: #4fc3f7; --border-accent: #1a3a6a;
    --fill-accent: #0288d1; --on-accent: #fff;
    --bg-success: #0f2040; --text-success: #4fc3f7; --border-success: #1a3a6a;
    --chip-bg: #0a2a4a; --pref-active-bg: #0a2a4a; --pref-active-text: #4fc3f7;
    --meta-bg: #0f2040; --meta-text: #7fb3d3;
  }
  .theme-lavender {
    --surface-0: #1a1528; --surface-1: #221e38; --surface-2: #2a2545;
    --border: rgba(179,157,219,0.15); --border-strong: rgba(179,157,219,0.3);
    --text-primary: #ede7f6; --text-secondary: #9575cd; --text-muted: #5a4e80;
    --bg-accent: #221e38; --text-accent: #b39ddb; --border-accent: #3d3560;
    --fill-accent: #7e57c2; --on-accent: #fff;
    --bg-success: #221e38; --text-success: #b39ddb; --border-success: #3d3560;
    --chip-bg: #312a50; --pref-active-bg: #312a50; --pref-active-text: #b39ddb;
    --meta-bg: #221e38; --meta-text: #9575cd;
  }
  .theme-paper {
    --surface-0: #faf6f0; --surface-1: #f2ece2; --surface-2: #fff;
    --border: rgba(100,70,40,0.12); --border-strong: rgba(100,70,40,0.25);
    --text-primary: #2c1810; --text-secondary: #6b4c35; --text-muted: #a08060;
    --bg-accent: #f0e4d0; --text-accent: #8b5e3c; --border-accent: #c9a07a;
    --fill-accent: #8b5e3c; --on-accent: #fff;
    --bg-success: #f0e4d0; --text-success: #8b5e3c; --border-success: #c9a07a;
    --chip-bg: #f0e4d0; --pref-active-bg: #f0e4d0; --pref-active-text: #8b5e3c;
    --meta-bg: #f0e4d0; --meta-text: #6b4c35;
  }

  body {
    font-family: var(--font-sans);
    background: var(--surface-0);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.25s, color 0.25s;
  }

  /* Layout */
  .shell { max-width: 720px; margin: 0 auto; padding: 0 1rem 4rem; }

  /* Nav */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 0; margin-bottom: 0.5rem; gap: 12px; flex-wrap: wrap;
  }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    padding: 7px 16px; border-radius: 20px; font-size: 14px;
    border: 0.5px solid transparent; cursor: pointer;
    background: none; color: var(--text-muted); font-family: var(--font-sans);
    transition: all 0.15s;
  }
  .nav-tab.active {
    background: var(--surface-2); border-color: var(--border-strong);
    color: var(--text-primary);
  }
  .nav-tab:not(.active):hover { color: var(--text-secondary); }
  .nav-right { display: flex; align-items: center; gap: 10px; }

  select {
    height: 32px; padding: 0 10px; border-radius: var(--radius);
    border: 0.5px solid var(--border-strong); background: var(--surface-2);
    color: var(--text-primary); font-size: 13px; font-family: var(--font-sans); cursor: pointer;
  }
  .theme-dots { display: flex; gap: 6px; align-items: center; }
  .theme-dot {
    width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
    border: 2.5px solid transparent; transition: border-color 0.15s; flex-shrink: 0;
  }
  .theme-dot.active { border-color: var(--text-primary); }
  .dot-default { background: conic-gradient(#e8e6e1 0deg 90deg,#3d3d3a 90deg 180deg,#e8e6e1 180deg 270deg,#3d3d3a 270deg); }
  .dot-forest  { background: #4a9e4a; }
  .dot-sunset  { background: #e76f51; }
  .dot-ocean   { background: #0288d1; }
  .dot-lavender{ background: #7e57c2; }
  .dot-paper   { background: #8b5e3c; }

  /* Page sections */
  .page { display: none; }
  .page.active { display: block; }

  /* Header */
  .page-header { margin-bottom: 1.75rem; }
  .page-header h1 { font-size: 22px; font-weight: 500; color: var(--text-primary); }
  .page-header p { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

  /* Ingredient input */
  .input-row { display: flex; gap: 8px; margin-bottom: 10px; position: relative; }
  .input-wrap { flex: 1; position: relative; }
  .input-row input {
    width: 100%; height: 36px; padding: 0 12px; border-radius: var(--radius);
    border: 0.5px solid var(--border-strong); background: var(--surface-2);
    color: var(--text-primary); font-size: 14px; font-family: var(--font-sans);
  }
  .input-row input::placeholder { color: var(--text-muted); }
  .input-row input:focus { outline: none; box-shadow: 0 0 0 2px var(--bg-accent); border-color: var(--border-accent); }
  .add-btn {
    height: 36px; padding: 0 16px; border-radius: var(--radius);
    border: 0.5px solid var(--border-strong); background: var(--surface-2);
    color: var(--text-primary); font-size: 14px; cursor: pointer; font-family: var(--font-sans);
    white-space: nowrap; display: flex; align-items: center; gap: 6px;
  }
  .add-btn:hover { background: var(--surface-1); }

  /* Autocomplete dropdown */
  .autocomplete-list {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--surface-2); border: 0.5px solid var(--border-strong);
    border-radius: var(--radius); box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    max-height: 220px; overflow-y: auto; z-index: 20; display: none;
  }
  .autocomplete-list.open { display: block; }
  .autocomplete-item {
    padding: 9px 12px; font-size: 13.5px; color: var(--text-primary);
    cursor: pointer; display: flex; align-items: center; gap: 8px;
  }
  .autocomplete-item i { color: var(--text-muted); font-size: 14px; }
  .autocomplete-item:hover, .autocomplete-item.highlighted { background: var(--surface-1); }

  /* Chips */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; min-height: 32px; margin-bottom: 0.85rem; }
  .chip {
    display: flex; align-items: center; gap: 6px; padding: 5px 10px 5px 12px;
    border-radius: 20px; background: var(--chip-bg, var(--bg-accent));
    color: var(--text-accent); font-size: 13px; font-weight: 500;
    animation: chip-in 0.18s ease;
  }
  @keyframes chip-in {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }
  .chip button {
    background: none; border: none; cursor: pointer; color: var(--text-accent);
    padding: 0; line-height: 1; font-size: 16px; opacity: 0.7;
  }
  .chip button:hover { opacity: 1; }
  .chip-empty { font-size: 13px; color: var(--text-muted); padding: 6px 0; }

  /* Pantry staples row */
  .pantry-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
  .pantry-chip {
    font-size: 12px; padding: 5px 11px; border-radius: 20px;
    border: 0.5px dashed var(--border-strong); background: transparent;
    color: var(--text-muted); cursor: pointer; font-family: var(--font-sans);
    display: flex; align-items: center; gap: 5px; transition: all 0.15s;
  }
  .pantry-chip i { font-size: 12px; }
  .pantry-chip:hover { color: var(--text-secondary); }
  .pantry-chip.active {
    border-style: solid; border-color: var(--border-success);
    background: var(--pref-active-bg, var(--bg-success));
    color: var(--pref-active-text, var(--text-success));
  }

  /* Surprise button */
  .surprise-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .surprise-btn {
    flex: 1; height: 38px; border-radius: var(--radius);
    border: 0.5px dashed var(--border-strong); background: transparent;
    color: var(--text-secondary); font-size: 13px; cursor: pointer;
    font-family: var(--font-sans); display: flex; align-items: center;
    justify-content: center; gap: 6px; transition: all 0.15s;
  }
  .surprise-btn:hover { background: var(--surface-1); color: var(--text-primary); border-style: solid; }
  .surprise-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .surprise-btn:disabled:hover { background: transparent; border-style: dashed; }
  .surprise-btn i { font-size: 14px; }

  /* Section label */
  .section-label {
    font-size: 12px; font-weight: 500; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px;
  }

  /* Pref buttons */
  .prefs-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .pref-btn {
    font-size: 12px; padding: 5px 12px; border-radius: 20px;
    border: 0.5px solid var(--border); background: var(--surface-2);
    color: var(--text-secondary); cursor: pointer; font-family: var(--font-sans);
  }
  .pref-btn.active {
    background: var(--pref-active-bg, var(--bg-success));
    color: var(--pref-active-text, var(--text-success));
    border-color: var(--border-success);
  }

  /* Generate button */
  .generate-btn {
    width: 100%; height: 42px; border-radius: var(--radius); border: none;
    background: var(--fill-accent); color: var(--on-accent); font-size: 15px;
    font-weight: 500; cursor: pointer; font-family: var(--font-sans); transition: opacity 0.15s;
  }
  .generate-btn:hover { opacity: 0.88; }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Results */
  .results { margin-top: 1.75rem; }
  .results-header { font-size: 13px; color: var(--text-muted); margin-bottom: 1rem; }

  /* Recipe card */
  .recipe-card {
    background: var(--surface-2); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 1.25rem; margin-bottom: 12px;
  }
  .recipe-name { font-size: 16px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; }
  .recipe-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .meta-pill {
    font-size: 11px; padding: 3px 9px; border-radius: 20px;
    background: var(--meta-bg, var(--surface-1)); color: var(--meta-text, var(--text-secondary));
    display: flex; align-items: center; gap: 4px;
  }
  .recipe-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 8px; }
  .card-actions { display: flex; gap: 10px; align-items: center; }
  .expand-btn {
    background: none; border: none; cursor: pointer; font-size: 12px;
    color: var(--text-accent); padding: 0; font-family: var(--font-sans);
  }
  .expand-btn:hover { text-decoration: underline; }
  .save-btn {
    background: none; border: 0.5px solid var(--border); border-radius: var(--radius);
    cursor: pointer; font-size: 12px; color: var(--text-muted); padding: 4px 10px;
    font-family: var(--font-sans); display: flex; align-items: center; gap: 5px;
    transition: all 0.15s;
  }
  .save-btn:hover { border-color: var(--border-strong); color: var(--text-secondary); }
  .save-btn.saved { background: var(--bg-accent); color: var(--text-accent); border-color: var(--border-accent); }

  .recipe-detail {
    margin-top: 12px; border-top: 0.5px solid var(--border);
    padding-top: 12px; display: none;
  }
  .recipe-detail.open { display: block; }
  .detail-section { margin-bottom: 12px; }
  .detail-title {
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
  }
  .detail-list { list-style: none; padding: 0; }
  .detail-list li {
    font-size: 13px; color: var(--text-secondary); line-height: 1.7;
    padding-left: 14px; position: relative;
  }
  .detail-list li::before { content: "·"; position: absolute; left: 0; color: var(--text-muted); }
  .chef-tip { font-size: 13px; color: var(--text-secondary); line-height: 1.6; padding-left: 14px; }

  /* Loading */
  .loading-state { text-align: center; padding: 2.5rem 0; }
  .loading-state p { font-size: 14px; color: var(--text-muted); margin-top: 8px; }
  .spinner {
    width: 28px; height: 28px; border: 2px solid var(--border);
    border-top-color: var(--fill-accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    font-size: 13px; color: #c0392b; background: #fdecea;
    border-radius: var(--radius); padding: 10px 14px; margin-top: 1rem;
  }

  /* Recent page */
  .recent-empty {
    text-align: center; padding: 4rem 1rem;
    color: var(--text-muted); font-size: 14px; line-height: 1.8;
  }
  .recent-empty i { font-size: 36px; display: block; margin-bottom: 12px; opacity: 0.4; }
  .recent-header-row {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;
  }
  .clear-btn {
    font-size: 12px; color: var(--text-muted); background: none; border: none;
    cursor: pointer; font-family: var(--font-sans); padding: 0;
  }
  .clear-btn:hover { color: var(--text-secondary); }
  .recent-date {
    font-size: 11px; color: var(--text-muted); margin-bottom: 6px;
    margin-top: 1.25rem; text-transform: uppercase; letter-spacing: 0.05em;
    font-weight: 500;
  }
  .recent-date:first-child { margin-top: 0; }
  .recent-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    background: var(--bg-accent); color: var(--text-accent);
    display: inline-block; margin-left: 6px;
  }

  /* Share / export icon button on cards */
  .icon-btn {
    background: none; border: 0.5px solid var(--border); border-radius: var(--radius);
    cursor: pointer; font-size: 12px; color: var(--text-muted); padding: 4px 8px;
    font-family: var(--font-sans); display: flex; align-items: center; gap: 5px;
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--border-strong); color: var(--text-secondary); }
  .icon-btn.flash { background: var(--bg-success); color: var(--text-success); border-color: var(--border-success); }

  /* Import/export row on Recent page */
  .io-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .io-btn {
    flex: 1; height: 36px; border-radius: var(--radius);
    border: 0.5px solid var(--border); background: var(--surface-2);
    color: var(--text-secondary); font-size: 13px; cursor: pointer;
    font-family: var(--font-sans); display: flex; align-items: center;
    justify-content: center; gap: 6px; transition: all 0.15s;
  }
  .io-btn:hover { background: var(--surface-1); color: var(--text-primary); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(12px);
    background: var(--text-primary); color: var(--surface-0);
    padding: 10px 18px; border-radius: 20px; font-size: 13px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.18); opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s; z-index: 200; white-space: nowrap;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

  /* Shared recipe overlay view */
  .shared-overlay {
    position: fixed; inset: 0; background: var(--surface-0); z-index: 100;
    overflow-y: auto; display: none;
  }
  .shared-overlay.open { display: block; }
  .shared-shell { max-width: 560px; margin: 0 auto; padding: 2rem 1rem 3rem; }
  .shared-banner {
    display: flex; align-items: center; gap: 8px; font-size: 13px;
    color: var(--text-muted); margin-bottom: 1.5rem;
  }
  .shared-banner i { color: var(--fill-accent); font-size: 16px; }
  .shared-actions { display: flex; gap: 10px; margin-top: 1.25rem; }
  .shared-actions .generate-btn { flex: 1; }
  .shared-dismiss {
    background: none; border: 0.5px solid var(--border-strong); border-radius: var(--radius);
    color: var(--text-secondary); font-size: 14px; cursor: pointer; font-family: var(--font-sans);
    padding: 0 16px; height: 42px;
  }
  .shared-dismiss:hover { background: var(--surface-1); }
  .shared-invalid { text-align: center; padding: 4rem 1rem; color: var(--text-muted); font-size: 14px; }

  /* Confetti */
  .confetti-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 300; overflow: hidden;
  }
  .confetti-piece {
    position: absolute; top: -10px; width: 8px; height: 8px; opacity: 0.9;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) translateX(var(--drift)) rotate(var(--spin)); opacity: 0; }
  }

  /* Cook mode */
  .cook-overlay {
    position: fixed; inset: 0; background: var(--surface-0); z-index: 150;
    display: none; flex-direction: column;
  }
  .cook-overlay.open { display: flex; }
  .cook-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.25rem; border-bottom: 0.5px solid var(--border);
  }
  .cook-progress-text { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .cook-exit-btn {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 22px; padding: 4px; line-height: 1; font-family: var(--font-sans);
  }
  .cook-exit-btn:hover { color: var(--text-primary); }
  .cook-progress-bar {
    height: 3px; background: var(--border); position: relative; overflow: hidden;
  }
  .cook-progress-fill {
    position: absolute; left: 0; top: 0; bottom: 0; background: var(--fill-accent);
    transition: width 0.25s ease;
  }
  .cook-body {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    padding: 2rem 1.5rem; max-width: 560px; margin: 0 auto; width: 100%;
    box-sizing: border-box; text-align: center;
  }
  .cook-recipe-name { font-size: 13px; color: var(--text-muted); margin-bottom: 0.5rem; }
  .cook-step-text {
    font-size: 21px; line-height: 1.5; color: var(--text-primary); font-weight: 450;
    margin-bottom: 1.75rem;
  }
  .cook-timer-wrap { margin-bottom: 1.75rem; }
  .cook-timer-display {
    font-size: 38px; font-weight: 600; color: var(--text-accent); font-variant-numeric: tabular-nums;
    margin-bottom: 10px;
  }
  .cook-timer-btn {

        <div class="autocomplete-list" id="autocomplete-list"></div>
      </div>

        <span id="ui-add">Add</span>
      </button>
    </div>
    <div class="chips" id="chips"></div>

    <div class="pantry-row" id="pantry-row"></div>

        <span id="ui-surprise">Surprise me</span>

    <div id="recent-content"></div>
  </div>

</div>

/* ── Ingredient database (for autocomplete) ─────────────────────────────── */
const INGREDIENT_DB = [
  "chicken breast","chicken thighs","ground beef","ground turkey","bacon","pork chops","sausage","steak","salmon","shrimp","tuna","tofu","eggs",
  "milk","butter","cheese","cheddar","mozzarella","parmesan","cream cheese","yogurt","sour cream","heavy cream",
  "rice","pasta","spaghetti","bread","flour","tortillas","noodles","quinoa","oats","breadcrumbs",
  "onion","garlic","tomato","potato","carrot","bell pepper","broccoli","spinach","lettuce","cucumber","zucchini","mushroom","celery","corn","peas","green beans","cabbage","avocado",
  "lemon","lime","apple","banana","orange","strawberries","blueberries",
  "olive oil","vegetable oil","soy sauce","vinegar","honey","sugar","brown sugar","salt","black pepper","paprika","cumin","oregano","basil","thyme","cinnamon","chili powder","ginger",
  "beans","black beans","chickpeas","lentils","canned tomatoes","tomato paste","coconut milk","broth","stock","mayonnaise","mustard","ketchup","peanut butter","almonds","walnuts"
];

/* ── Pantry staples (excluded from "missing ingredient" prompts) ─────────── */
const PANTRY_STAPLES = [
  { key: "salt" }, { key: "black pepper" }, { key: "olive oil" }, { key: "butter" },
  { key: "garlic" }, { key: "onion" }, { key: "flour" }, { key: "sugar" }
];

/* ── Surprise pools (randomized ingredient sets to spark ideas) ──────────── */
const SURPRISE_POOLS = [
  ["chicken breast","lemon","garlic","spinach"],
  ["ground beef","onion","bell pepper","rice"],
  ["shrimp","garlic","lime","cilantro"],
  ["tofu","soy sauce","ginger","broccoli"],
  ["eggs","cheese","spinach","mushroom"],
  ["pasta","tomato","garlic","basil"],
  ["salmon","lemon","asparagus","dill"],
  ["chickpeas","tomato","onion","cumin"],
  ["pork chops","apple","onion","thyme"],
  ["potato","cheese","bacon","sour cream"]
];

/* ── State ────────────────────────────────────────────────────────────── */
let lang = 'en';
let ingredients = [];
let prefs = [];
let pantryActive = []; // active pantry staple keys
let savedRecipes = JSON.parse(localStorage.getItem('recipe-app-saved') || '[]');
let currentRecipes = []; // recipes currently shown
let currentPage = 'generator';
let acMatches = []; // current autocomplete matches
let acHighlight = -1; // highlighted autocomplete index

/* ── Helpers ──────────────────────────────────────────────────────────── */
function t(key, ...args) {
  const l = LANGS[lang] || LANGS.en;
  const v = l[key] !== undefined ? l[key] : LANGS.en[key];
  return typeof v === 'function' ? v(...args) : (v || '');
}

function persist() {
  localStorage.setItem('recipe-app-saved', JSON.stringify(savedRecipes));
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
}

/* ── Navigation ───────────────────────────────────────────────────────── */
function showPage(name) {
  currentPage = name;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'recent') renderRecent();
}

/* ── Theme ────────────────────────────────────────────────────────────── */
function setTheme(theme) {
  document.body.className = 'theme-' + theme;
  document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
  document.querySelector('.dot-' + theme).classList.add('active');
}

/* ── Language ─────────────────────────────────────────────────────────── */
function setLang(l) {
  lang = l;
  renderUI();
  if (currentPage === 'recent') renderRecent();
  if (document.getElementById('shared-overlay').classList.contains('open')) checkForSharedRecipe();
}

function renderUI() {
  document.getElementById('tab-generator').textContent = t('tabGenerator');
  document.getElementById('tab-recent').textContent = t('tabRecent');
  document.getElementById('ui-title').textContent = t('title');
  document.getElementById('ui-subtitle').textContent = t('subtitle');
  document.getElementById('ui-add').textContent = t('add');
  document.getElementById('ing-input').placeholder = t('placeholder');
  document.getElementById('ui-diet-label').textContent = t('diet');
  document.getElementById('ui-surprise').textContent = t('surprise');
  document.getElementById('ui-share-fridge').textContent = t('shareFridge');
  document.getElementById('ui-recent-title').textContent = t('recentTitle');
  document.getElementById('ui-recent-subtitle').textContent = t('recentSubtitle');
  document.getElementById('ui-export-all').textContent = t('exportAll');
  document.getElementById('ui-import').textContent = t('import');
  renderChips();
  renderPrefs();
  renderPantryRow();
  updateBtn();
  if (currentRecipes.length) renderRecipes(currentRecipes, false); // re-render labels
}

function renderPrefs() {
  const labels = t('prefs');
  const keys = t('prefKeys');
  document.getElementById('prefs-row').innerHTML = labels.map((label, i) =>
    `<button class="pref-btn${prefs.includes(keys[i]) ? ' active' : ''}" onclick="togglePref(this,'${keys[i]}')">${label}</button>`
  ).join('');
}

function renderPantryRow() {
  const row = document.getElementById('pantry-row');
  row.innerHTML = PANTRY_STAPLES.map(s => {
    const active = pantryActive.includes(s.key);
    return `<button class="pantry-chip${active ? ' active' : ''}" onclick="togglePantry('${s.key}')">
      <i class="ti ${active ? 'ti-check' : 'ti-plus'}" aria-hidden="true"></i>${s.key}
    </button>`;
  }).join('');
}

function togglePantry(key) {
  const idx = pantryActive.indexOf(key);
  if (idx > -1) {
    pantryActive.splice(idx, 1);
    ingredients = ingredients.filter(i => i !== key);
  } else {
    pantryActive.push(key);
    if (!ingredients.includes(key)) ingredients.push(key);
  }
  renderPantryRow();
  renderChips();
  updateBtn();
}

/* ── Ingredients ──────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('ing-input');
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (acHighlight > -1 && acMatches[acHighlight]) {
        selectAutocomplete(acMatches[acHighlight]);
      } else {
        addIngredient();
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (acMatches.length) { acHighlight = (acHighlight + 1) % acMatches.length; renderAutocomplete(); }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (acMatches.length) { acHighlight = (acHighlight - 1 + acMatches.length) % acMatches.length; renderAutocomplete(); }
    } else if (e.key === 'Escape') {
      closeAutocomplete();
    }
  });
  input.addEventListener('input', () => updateAutocomplete(input.value));
  input.addEventListener('blur', () => setTimeout(closeAutocomplete, 120));
  renderUI();
});

function addIngredient() {
  const input = document.getElementById('ing-input');
  const val = input.value.trim().toLowerCase();
  closeAutocomplete();
  if (!val || ingredients.includes(val)) { input.value = ''; return; }
  ingredients.push(val);
  input.value = '';
  renderChips();
  updateBtn();
}

function removeIngredient(i) {
  const removed = ingredients[i];
  ingredients.splice(i, 1);
  // keep pantry toggle row in sync if a staple chip was removed directly
  const staleIdx = pantryActive.indexOf(removed);
  if (staleIdx > -1) { pantryActive.splice(staleIdx, 1); renderPantryRow(); }
  renderChips();
  updateBtn();
}

function renderChips() {
  const el = document.getElementById('chips');
  if (!ingredients.length) {
    el.innerHTML = `<span class="chip-empty">${t('empty')}</span>`;
    return;
  }
  el.innerHTML = ingredients.map((ing, i) =>
    `<span class="chip">${ing}<button onclick="removeIngredient(${i})" aria-label="Remove ${ing}">×</button></span>`
  ).join('');
}

/* ── Autocomplete ─────────────────────────────────────────────────────── */
function updateAutocomplete(query) {
  const q = query.trim().toLowerCase();
  acHighlight = -1;
  if (!q) { closeAutocomplete(); return; }
  acMatches = INGREDIENT_DB
    .filter(item => item.includes(q) && !ingredients.includes(item))
    .sort((a, b) => a.indexOf(q) - b.indexOf(q))
    .slice(0, 6);
  renderAutocomplete();
}

function renderAutocomplete() {
  const list = document.getElementById('autocomplete-list');
  if (!acMatches.length) { list.classList.remove('open'); list.innerHTML = ''; return; }
  list.innerHTML = acMatches.map((item, i) =>
    `<div class="autocomplete-item${i === acHighlight ? ' highlighted' : ''}" onmousedown="selectAutocomplete('${item.replace(/'/g, "\\'")}')">
      <i class="ti ti-search" aria-hidden="true"></i>${item}
    </div>`
  ).join('');
  list.classList.add('open');
}

function selectAutocomplete(item) {
  if (!ingredients.includes(item)) ingredients.push(item);
  document.getElementById('ing-input').value = '';
  closeAutocomplete();
  renderChips();
  updateBtn();
  document.getElementById('ing-input').focus();
}

function closeAutocomplete() {
  acMatches = []; acHighlight = -1;
  const list = document.getElementById('autocomplete-list');
  list.classList.remove('open');
  list.innerHTML = '';
}

function togglePref(btn, pref) {
  if (prefs.includes(pref)) { prefs = prefs.filter(p => p !== pref); btn.classList.remove('active'); }
  else { prefs.push(pref); btn.classList.add('active'); }
}

function updateBtn() {
  const btn = document.getElementById('gen-btn');
  if (ingredients.length) { btn.disabled = false; btn.textContent = t('btnReady', ingredients.length); }
  else { btn.disabled = true; btn.textContent = t('btnEmpty'); }
  const shareFridgeBtn = document.getElementById('share-fridge-btn');
  if (shareFridgeBtn) shareFridgeBtn.disabled = !ingredients.length;
}

/* ── Surprise me ──────────────────────────────────────────────────────── */
function surpriseMe() {
  const pool = SURPRISE_POOLS[Math.floor(Math.random() * SURPRISE_POOLS.length)];
  pool.forEach(item => { if (!ingredients.includes(item)) ingredients.push(item); });
  renderChips();
  updateBtn();
  generate();
}

/* ── Generate ─────────────────────────────────────────────────────────── */
async function generate() {
  const btn = document.getElementById('gen-btn');
  const results = document.getElementById('results');
  btn.disabled = true; btn.textContent = t('btnLoading');
  currentRecipes = [];
  results.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>${t('loading')}</p></div>`;

  const prefStr = prefs.length ? `Dietary preferences: ${prefs.join(', ')}.` : '';
  const pantryStr = pantryActive.length ? `The user always has these pantry basics on hand, so don't flag them as missing: ${pantryActive.join(', ')}.` : '';
  const langNames = { en:'English', bg:'Bulgarian', es:'Spanish', fr:'French', de:'German', it:'Italian', zh:'Chinese (Simplified)', ja:'Japanese' };

  const prompt = `You are a creative chef assistant. Given a list of ingredients, suggest 4 recipe ideas. Respond entirely in ${langNames[lang] || 'English'}.

Ingredients: ${ingredients.join(', ')}.
${prefStr}
${pantryStr}

Respond ONLY with a JSON array (no markdown, no extra text):
[{"name":"...","time":"...","difficulty":"...","servings":"...","description":"...","ingredients":["..."],"steps":["..."],"tip":"..."}]
Vary cuisines. For missing key ingredients (excluding pantry basics noted above), prefix with "also need:" in the ingredients list.`;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const text = data.choices[0].message.content;
    const clean = text.replace(/```json|```/g, '').trim();
    const recipes = JSON.parse(clean);
    currentRecipes = recipes;
    renderRecipes(recipes, true);
  } catch(e) {
    results.innerHTML = `<div class="error-msg">${t('error')}</div>`;
  }
  btn.disabled = false; btn.textContent = t('btnReady', ingredients.length);
}

/* ── Recipe card rendering ────────────────────────────────────────────── */
function isSaved(name) {
  return savedRecipes.some(r => r.name === name);
}

function toggleSave(name, idx, fromRecent) {
  const wasSaved = isSaved(name);
  if (wasSaved) {
    savedRecipes = savedRecipes.filter(r => r.name !== name);
  } else {
    const recipe = fromRecent
      ? savedRecipes.find(r => r.name === name) // already there, won't happen
      : currentRecipes[idx];
    if (recipe) savedRecipes.unshift({ ...recipe, savedAt: new Date().toISOString() });
  }
  persist();
  // Update button appearance without full re-render
  const btn = document.getElementById((fromRecent ? 'rsave-' : 'gsave-') + idx);
  if (btn) {
    const saved = isSaved(name);
    btn.className = 'save-btn' + (saved ? ' saved' : '');
    btn.innerHTML = `<i class="ti ${saved ? 'ti-bookmark-filled' : 'ti-bookmark'}" aria-hidden="true"></i> ${saved ? t('saved') : t('save')}`;
    if (!wasSaved && saved) fireConfetti(btn);
  }
  if (fromRecent) renderRecent();
}

/* ── Confetti ─────────────────────────────────────────────────────────── */
function fireConfetti(originEl) {
  const colors = ['#1a5cc8', '#e76f51', '#4a9e4a', '#f4a261', '#7e57c2', '#4fc3f7'];
  const rect = originEl ? originEl.getBoundingClientRect() : { left: window.innerWidth / 2, top: window.innerHeight / 2, width: 0 };
  const originX = rect.left + rect.width / 2;
  const originY = rect.top;

  const layer = document.createElement('div');
  layer.className = 'confetti-layer';
  document.body.appendChild(layer);

  const count = 22;
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[i % colors.length];
    const drift = (Math.random() - 0.5) * 220;
    const spin = (Math.random() - 0.5) * 720;
    const duration = 1100 + Math.random() * 700;
    const delay = Math.random() * 120;
    const size = 6 + Math.random() * 5;
    piece.style.left = `${originX + (Math.random() - 0.5) * 30}px`;
    piece.style.top = `${originY}px`;
    piece.style.width = `${size}px`;
    piece.style.height = `${size * (0.5 + Math.random() * 0.6)}px`;
    piece.style.background = color;
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.setProperty('--drift', `${drift}px`);
    piece.style.setProperty('--spin', `${spin}deg`);
    piece.style.animationDuration = `${duration}ms`;
    piece.style.animationDelay = `${delay}ms`;
    layer.appendChild(piece);
  }

  setTimeout(() => layer.remove(), 2200);
}

function toggleDetail(prefix, id) {
  const el = document.getElementById(prefix + 'detail-' + id);
  const btn = document.getElementById(prefix + 'expand-' + id);
  if (el.classList.contains('open')) {
    el.classList.remove('open'); btn.textContent = t('expand');
  } else {
    el.classList.add('open'); btn.textContent = t('collapse');
  }
}

function renderRecipes(recipes, newSearch) {
  const results = document.getElementById('results');
  results.innerHTML = `<p class="results-header">${t('results', recipes.length)}</p>` +
    recipes.map((r, i) => recipeCardHTML(r, i, 'g', false)).join('');

/* ── Recent page ──────────────────────────────────────────────────────── */
function clearAll() {
  if (!confirm(t('confirmClear'))) return;
  savedRecipes = [];
  persist();
  renderRecent();
}

function renderRecent() {
  const el = document.getElementById('recent-content');
  if (!savedRecipes.length) {
    el.innerHTML = `
      <div class="recent-empty">
        <i class="ti ti-bookmark" aria-hidden="true"></i>
        ${t('recentEmpty').replace('\n','<br>')}
        <br><br>
        <button class="pref-btn" style="margin-top:4px" onclick="showPage('generator')">${t('goGen')}</button>
      </div>`;
    return;
  }

  // Group by date
  const groups = {};
  savedRecipes.forEach(r => {
    const d = formatDate(r.savedAt || new Date().toISOString());
    if (!groups[d]) groups[d] = [];
    groups[d].push(r);
  });

  let html = `<div class="recent-header-row">
    <span class="results-header">${t('savedCount', savedRecipes.length)}</span>
    <button class="clear-btn" onclick="clearAll()">${t('clearAll')}</button>
  </div>`;

  Object.entries(groups).forEach(([date, recipes]) => {
    html += `<div class="recent-date">${date}</div>`;
    html += recipes.map((r, i) => {
      const globalIdx = savedRecipes.indexOf(r);
      return recipeCardHTML(r, globalIdx, 'r', true);
    }).join('');
  });

  el.innerHTML = html;
}

/* ── Toast ────────────────────────────────────────────────────────────── */
let toastTimer = null;
function showToast(msg, icon) {
  const el = document.getElementById('toast');
  el.innerHTML = `${icon ? `<i class="ti ${icon}" aria-hidden="true"></i>` : ''}${msg}`;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ── Share link (recipe encoded directly in the URL, no server storage) ─── */
function encodeRecipeForShare(r) {
  // Strip local-only fields (savedAt) before sharing
  const payload = { name: r.name, time: r.time, difficulty: r.difficulty, servings: r.servings,
    description: r.description, ingredients: r.ingredients, steps: r.steps, tip: r.tip };
  const json = JSON.stringify(payload);
  const b64 = btoa(unescape(encodeURIComponent(json))); // UTF-8 safe base64
  return b64;
}

function decodeRecipeFromShare(b64) {
  const json = decodeURIComponent(escape(atob(b64)));
  const obj = JSON.parse(json);
  if (!obj || typeof obj !== 'object' || !obj.name || !Array.isArray(obj.ingredients) || !Array.isArray(obj.steps)) {
    throw new Error('invalid shape');
  }
  return obj;
}

async function shareRecipe(idx, fromRecent) {
  const recipe = fromRecent ? savedRecipes[idx] : currentRecipes[idx];
  if (!recipe) return;
  const encoded = encodeRecipeForShare(recipe);
  const url = `${location.origin}${location.pathname}#recipe=${encoded}`;

  if (navigator.share) {
    try {
      await navigator.share({ title: recipe.name, url });
      return;
    } catch (e) {
      // user cancelled native share sheet — fall through to clipboard copy
    }
  }
  try {
    await navigator.clipboard.writeText(url);
    showToast(t('toastCopied'), 'ti-check');
  } catch (e) {
    // clipboard blocked — show the link so the user can copy manually
    prompt(t('toastCopied') + ':', url);
  }
}

/* ── Single-recipe export as a .fridgify file ─────────────────────────── */
function downloadFridgifyFile(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || 'recipe';
}

function exportSingle(idx, fromRecent) {
  const recipe = fromRecent ? savedRecipes[idx] : currentRecipes[idx];
  if (!recipe) return;
  const payload = { fridgifyVersion: 1, type: 'recipe', recipe: {
    name: recipe.name, time: recipe.time, difficulty: recipe.difficulty, servings: recipe.servings,
    description: recipe.description, ingredients: recipe.ingredients, steps: recipe.steps, tip: recipe.tip
  }};
  downloadFridgifyFile(payload, `${slugify(recipe.name)}.fridgify`);
}

function exportAll() {
  if (!savedRecipes.length) { showToast(t('toastImportError'), 'ti-alert-circle'); return; }
  const payload = { fridgifyVersion: 1, type: 'collection', recipes: savedRecipes };
  downloadFridgifyFile(payload, 'fridgify-recipes.fridgify');
  showToast(t('toastExported'), 'ti-download');
}

/* ── Import a .fridgify (or plain .json with the same shape) file ───────── */
function handleImportFile(event) {
  const file = event.target.files[0];
  event.target.value = ''; // reset so the same file can be re-selected later
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      let toAdd = [];
      if (data.type === 'recipe' && data.recipe) toAdd = [data.recipe];
      else if (data.type === 'collection' && Array.isArray(data.recipes)) toAdd = data.recipes;
      else throw new Error('unrecognized shape');

      let added = 0;
      toAdd.forEach(r => {
        if (r && r.name && Array.isArray(r.ingredients) && Array.isArray(r.steps)) {
          if (!savedRecipes.some(s => s.name === r.name)) {
            savedRecipes.unshift({ ...r, savedAt: new Date().toISOString() });
            added++;
          }
        }
      });
      persist();
      renderRecent();
      showToast(t('toastImported', added), 'ti-upload');
    } catch (e) {
      showToast(t('toastImportError'), 'ti-alert-circle');
    }
  };
  reader.readAsText(file);
}

/* ── Shared-recipe overlay (opened via a Fridgify share link) ───────────── */
function checkForSharedRecipe() {
  const hash = location.hash;
  const match = hash.match(/^#recipe=(.+)$/);
  if (!match) return;

  const overlay = document.getElementById('shared-overlay');
  const shell = document.getElementById('shared-shell');
  let recipe;
  try {
    recipe = decodeRecipeFromShare(match[1]);
  } catch (e) {
    shell.innerHTML = `<div class="shared-invalid">${t('sharedInvalid')}</div>
      <div class="shared-actions"><button class="shared-dismiss" onclick="dismissSharedOverlay()">${t('sharedDismiss')}</button></div>`;
    overlay.classList.add('open');
    return;
  }

  window._pendingSharedRecipe = recipe;
  shell.innerHTML = `
    <div class="shared-banner"><i class="ti ti-chef-hat" aria-hidden="true"></i>${t('sharedBanner')}</div>
    ${recipeCardHTML(recipe, 0, 's', false)}
    <div class="shared-actions">
      <button class="generate-btn" onclick="saveSharedRecipe()">${t('sharedAdd')}</button>
      <button class="shared-dismiss" onclick="dismissSharedOverlay()">${t('sharedDismiss')}</button>
    </div>`;
  overlay.classList.add('open');
}

function saveSharedRecipe() {
  const recipe = window._pendingSharedRecipe;
  if (!recipe) return;
  if (!savedRecipes.some(s => s.name === recipe.name)) {
    savedRecipes.unshift({ ...recipe, savedAt: new Date().toISOString() });
    persist();
  }
  fireConfetti();
  showToast(t('saved'), 'ti-bookmark-filled');
  dismissSharedOverlay();
  showPage('recent');
}

function dismissSharedOverlay() {
  document.getElementById('shared-overlay').classList.remove('open');
  history.replaceState(null, '', location.pathname + location.search);
}

/* ── Fridge-merge sharing (share your ingredient list, no server) ───────── */
function encodeFridgeForShare(list) {
  const json = JSON.stringify(list);
  return btoa(unescape(encodeURIComponent(json)));
}

function decodeFridgeFromShare(b64) {
  const json = decodeURIComponent(escape(atob(b64)));
  const arr = JSON.parse(json);
  if (!Array.isArray(arr) || !arr.every(x => typeof x === 'string')) throw new Error('invalid shape');
  return arr;
}

async function shareFridgeContents() {
  if (!ingredients.length) return;
  const encoded = encodeFridgeForShare(ingredients);
  const url = `${location.origin}${location.pathname}#fridge=${encoded}`;

  if (navigator.share) {
    try { await navigator.share({ title: 'My Fridgify ingredients', url }); return; }
    catch (e) { /* user cancelled — fall through to clipboard */ }
  }
  try {
    await navigator.clipboard.writeText(url);
    showToast(t('toastCopied'), 'ti-check');
  } catch (e) {
    prompt(t('toastCopied') + ':', url);
  }
}

function checkForSharedFridge() {
  const match = location.hash.match(/^#fridge=(.+)$/);
  if (!match) return;

  const overlay = document.getElementById('merge-overlay');
  const shell = document.getElementById('merge-shell');
  let list;
  try {
    list = decodeFridgeFromShare(match[1]);
  } catch (e) {
    shell.innerHTML = `<div class="shared-invalid">${t('sharedInvalid')}</div>
      <div class="shared-actions"><button class="shared-dismiss" onclick="dismissMergeOverlay()">${t('sharedDismiss')}</button></div>`;
    overlay.classList.add('open');
    return;
  }

  window._pendingMergeIngredients = list;
  shell.innerHTML = `
    <div class="shared-banner"><i class="ti ti-rosette-discount-check" aria-hidden="true"></i>${t('mergeBanner')}</div>
    <div class="merge-chip-preview">${list.map(ing => `<span class="chip">${ing}</span>`).join('')}</div>
    <div class="shared-actions">
      <button class="generate-btn" onclick="confirmMergeFridge()">${t('mergeAdd')}</button>
      <button class="shared-dismiss" onclick="dismissMergeOverlay()">${t('mergeDismiss')}</button>
    </div>`;
  overlay.classList.add('open');
}

function confirmMergeFridge() {
  const list = window._pendingMergeIngredients || [];
  let added = 0;
  list.forEach(ing => { if (!ingredients.includes(ing)) { ingredients.push(ing); added++; } });
  renderChips();
  updateBtn();
  showToast(t('mergeAdded', added), 'ti-check');
  dismissMergeOverlay();
  showPage('generator');
}

function dismissMergeOverlay() {
  document.getElementById('merge-overlay').classList.remove('open');
  history.replaceState(null, '', location.pathname + location.search);
}

/* ── Cook mode: full-screen step-by-step view with timers ───────────────── */
let cookState = null; // { recipe, stepIndex, timerInterval, timerRemaining }

let wakeLockHandle = null;

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) wakeLockHandle = await navigator.wakeLock.request('screen');
  } catch (e) {
    // wake lock unsupported or blocked — cook mode still works, screen may just dim normally
  }
}

function releaseWakeLock() {
  if (wakeLockHandle) { wakeLockHandle.release().catch(() => {}); wakeLockHandle = null; }
}

function startCookMode(idx, fromRecent) {
  const recipe = fromRecent ? savedRecipes[idx] : currentRecipes[idx];
  if (!recipe || !recipe.steps || !recipe.steps.length) return;
  cookState = { recipe, stepIndex: 0, timerInterval: null, timerRemaining: 0, timerRunning: false };
  document.getElementById('cook-overlay').classList.add('open');
  requestWakeLock();
  renderCookStep();
}

function guessTimerSeconds(stepText) {
  // Look for a duration in the step text and suggest a timer for it.
  // Ranges like "8-10 minutes" use the upper bound (safer full cook time).
  const text = stepText.toLowerCase();
  const MAX_SECONDS = 60 * 60; // cap at 60 min — longer waits aren't a great fit for an on-screen timer
  let seconds = 0;
  const rangeMatch = text.match(/(\d+)\s*(?:-|to)\s*(\d+)\s*(minutes|minute|mins|min|hours|hour|hrs|hr)\b/);
  if (rangeMatch) {
    const upper = parseInt(rangeMatch[2], 10);
    seconds = rangeMatch[3].startsWith('h') ? upper * 3600 : upper * 60;
  } else {
    const hourMatch = text.match(/(\d+)\s*(hours|hour|hrs|hr)\b/);
    const minMatch = text.match(/(\d+)\s*(minutes|minute|mins|min)\b/);
    const secMatch = text.match(/(\d+)\s*(seconds|second|secs|sec)\b/);
    if (hourMatch) seconds = parseInt(hourMatch[1], 10) * 3600;
    else if (minMatch) seconds = parseInt(minMatch[1], 10) * 60;
    else if (secMatch) seconds = parseInt(secMatch[1], 10);
  }
  return seconds > MAX_SECONDS ? 0 : seconds;
}

function renderCookStep() {
  if (!cookState) return;
  stopCookTimer(); // clear any running timer from the previous step
  const { recipe, stepIndex } = cookState;
  const total = recipe.steps.length;
  const stepText = recipe.steps[stepIndex];
  const suggestedSeconds = guessTimerSeconds(stepText);
  cookState.timerRemaining = suggestedSeconds;

  document.getElementById('cook-progress-text').textContent = t('cookStepOf', stepIndex + 1, total);
  document.getElementById('cook-progress-fill').style.width = `${((stepIndex + 1) / total) * 100}%`;

  const body = document.getElementById('cook-body');
  if (stepIndex < total) {
    body.innerHTML = `
      <div class="cook-recipe-name">${recipe.name}</div>
      <div class="cook-step-text">${stepText}</div>
      ${suggestedSeconds > 0 ? `
      <div class="cook-timer-wrap">
        <div class="cook-timer-display" id="cook-timer-display">${formatTimer(suggestedSeconds)}</div>
        <button class="cook-timer-btn" id="cook-timer-btn" onclick="toggleCookTimer()">
          <i class="ti ti-player-play" aria-hidden="true"></i> ${t('cookStartTimer')}
        </button>
      </div>` : ''}
    `;
  }

  const nav = document.getElementById('cook-nav');
  if (stepIndex >= total) {
    body.innerHTML = `<div class="cook-finished">${t('cookFinished')}</div>`;
    nav.innerHTML = `<button class="cook-nav-btn next" onclick="exitCookMode()">${t('cookDone')}</button>`;
  } else {
    nav.innerHTML = `
      <button class="cook-nav-btn prev" onclick="cookPrevStep()" ${stepIndex === 0 ? 'disabled' : ''}>
        <i class="ti ti-chevron-left" aria-hidden="true"></i> ${t('cookPrev')}
      </button>
      <button class="cook-nav-btn next" onclick="cookNextStep()">
        ${stepIndex === total - 1 ? t('cookDone') : t('cookNext')} <i class="ti ti-chevron-right" aria-hidden="true"></i>
      </button>`;
  }
}

function cookNextStep() {
  if (!cookState) return;
  cookState.stepIndex++;
  renderCookStep();
}

function cookPrevStep() {
  if (!cookState || cookState.stepIndex === 0) return;
  cookState.stepIndex--;
  renderCookStep();
}

function formatTimer(totalSeconds) {
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function toggleCookTimer() {
  if (!cookState || cookState.timerRunning) return;
  cookState.timerRunning = true;
  const btn = document.getElementById('cook-timer-btn');
  if (btn) {
    btn.classList.add('running');
    btn.innerHTML = `<i class="ti ti-hourglass" aria-hidden="true"></i> ${t('cookTimerRunning')}`;
  }
  cookState.timerInterval = setInterval(() => {
    cookState.timerRemaining--;
    const display = document.getElementById('cook-timer-display');
    if (display) display.textContent = formatTimer(Math.max(0, cookState.timerRemaining));
    if (cookState.timerRemaining <= 0) {
      stopCookTimer();
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      showToast(t('cookTimerRunning').replace('…', '') + ' ✓', 'ti-bell');
    }
  }, 1000);
}

function stopCookTimer() {
  if (cookState && cookState.timerInterval) {
    clearInterval(cookState.timerInterval);
    cookState.timerInterval = null;
    cookState.timerRunning = false;
  }
}

function exitCookMode() {
  stopCookTimer();
  releaseWakeLock();
  cookState = null;
  document.getElementById('cook-overlay').classList.remove('open');
}

/* ── Unified hash router (recipe share link vs fridge share link) ───────── */
function handleHashRoute() {
  if (location.hash.startsWith('#recipe=')) checkForSharedRecipe();
  else if (location.hash.startsWith('#fridge=')) checkForSharedFridge();
}

document.addEventListener('DOMContentLoaded', handleHashRoute);

/* ── PWA: register service worker ────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
